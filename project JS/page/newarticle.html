<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rikkei Edu Blog - Add New Article</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../CSS/newarticle.css" />
  </head>
  <body>
    <div class="form-container">
      <div id="head">
        <div class="head-left">
          <button class="back-icon-btn">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <span><i class="fa-solid fa-pen-to-square"></i> Add New Article</span>
        </div>
      </div>

      <form action="#">
        <div class="form-group">
          <label for="input_1">Title</label>
          <input
            type="text"
            id="input_1"
            placeholder="Enter a catchy title for your article..."
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <div class="form-group">
              <label for="category_selection">Article Categories</label>
              <select id="category_selection">
                <option value="" disabled selected>selection</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="mood">Mood</label>
            <input
              type="text"
              id="mood"
              placeholder="😃 How are you feeling?"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="input_3">Content</label>
          <textarea
            id="input_3"
            rows="6"
            placeholder="Share your thoughts with the community..."
          ></textarea>
        </div>

        <div class="form-group">
          <label class="section-label">Privacy Status</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="status" value="public" checked />
              <span class="custom-radio"></span>
              <span>Public</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="status" value="private" />
              <span class="custom-radio"></span>
              <span>Private</span>
            </label>
          </div>
        </div>

        <div class="upload-box" id="uploadBox">
          <input type="file" id="fileInput" hidden accept="image/*" />
          <label for="fileInput" class="upload-content" id="uploadPlaceholder">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>Browse and choose a high-quality image</p>
            <span>PNG, JPG up to 5MB</span>
          </label>
          <img
            src=""
            alt="Preview"
            id="imagePreview"
            style="
              display: none;
              width: 100%;
              height: 100%;
              object-fit: cover;
              border-radius: 8px;
            "
          />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-add">
            <i class="fa-solid fa-plus"></i> ADD ARTICLE
          </button>
          <a href="../page/article_add.html" class="btn-cancel"
            >Cancel and return to home</a
          >
        </div>
      </form>
    </div>
  </body>
  <script src="../js/newarticle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</html>
