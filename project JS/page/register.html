<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rikkei Edu Blog - Register</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../CSS/register.css" />
  </head>
  <body>
    <div class="bg-circle circle-purple-1"></div>
    <div class="bg-circle circle-purple-2"></div>

    <div class="container">
      <form id="registerForm">
        <div class="input-box-name">
          <div class="fist-name">
            <input type="text" id="fist-name" placeholder="First name" />
            <label>First name</label>
            <span class="error-msg" id="fist-name-error"></span>
          </div>
          <div class="last-name">
            <input type="text" id="last-name" placeholder="Last name" />
            <label>Last name</label>
            <span class="error-msg" id="last-name-error"></span>
          </div>
        </div>

        <div class="input-box">
          <input
            type="text"
            id="email"
            placeholder="Email address"
            autocomplete="username"
          />
          <label>Email address</label>
          <span class="error-msg" id="email-error"></span>
        </div>

        <div class="input-box">
          <input
            type="password"
            id="password-input"
            placeholder="Password"
            autocomplete="new-password"
          />
          <label>Password</label>
          <span class="error-msg" id="password-error"></span>
        </div>

        <div class="input-box">
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            autocomplete="new-password"
          />
          <label>Confirm Password</label>
          <span class="error-msg" id="confirm-password-error"></span>
        </div>

        <button type="submit" class="btn-action">Sign up</button>

        <div class="link-footer">
          Already have an account? <a href="login.html">login</a>
        </div>
      </form>
    </div>

    <script src="../js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
